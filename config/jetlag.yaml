# JetLag Appliance Configuration
# ================================

setup_completed: false

appliance:
  hostname: jetlag
  timezone: UTC

network:
  wan_interface: eth0
  lan_interface: eth1
  lan_ip: 10.0.1.1
  lan_subnet: 10.0.1.0/24

dhcp:
  enabled: true
  range_start: 10.0.1.100
  range_end: 10.0.1.250
  lease_time: 1h
  gateway: 10.0.1.1
  dns_server: 10.0.1.1

vlans: []
  # - id: 10
  #   name: "economy-class"
  #   interface: eth1.10
  #   ip: 10.0.10.1
  #   subnet: 10.0.10.0/24
  #   dhcp_range_start: 10.0.10.100
  #   dhcp_range_end: 10.0.10.250

dns:
  # When spoofing is active, all queries resolve to the portal IP
  spoof_target: 10.0.1.1
  upstream_servers:
    - 1.1.1.1
    - 8.8.8.8

portal:
  # Port the captive portal HTTP server listens on
  http_port: 80
  https_port: 443
  # Self-signed cert settings
  ssl_cert: /etc/jetlag/ssl/portal.crt
  ssl_key: /etc/jetlag/ssl/portal.key
  ssl_cn: "wifi.airline.com"
  # Portal type: click_through | web_login | tiered | time_limited | walled_garden
  portal_type: click_through
  # Web-login credentials (portal_type: web_login)
  login_username: guest
  login_password: guest
  # Session duration in minutes (portal_type: time_limited)
  session_duration_minutes: 60
  # Tiered plans (portal_type: tiered)
  tiered_plans:
    - name: "Basic (30 min)"
      duration_minutes: 30
    - name: "Standard (2 hr)"
      duration_minutes: 120
    - name: "Premium (unlimited)"
      duration_minutes: 0
  # Domains accessible without auth (portal_type: walled_garden)
  walled_garden_domains: []
  # Redirect URL after authentication
  redirect_url: "https://www.google.com"
  # Welcome message shown on portal page
  welcome_message: "Welcome aboard! Please accept the terms to continue."

wireless:
  enabled: false
  hotspot_mode: false
  wan_interface: ""
  virtual_interface: ap0
  interface: wlan0
  ssid: "JetLag-WiFi"
  channel: 6
  hw_mode: g                    # a = 5GHz, g = 2.4GHz
  ieee80211n: true              # 802.11n (HT)
  ieee80211ac: false            # 802.11ac (VHT) — requires hw_mode: a
  wpa: 2                        # 0 = open, 2 = WPA2
  wpa_passphrase: "JetLag1234"
  wpa_key_mgmt: WPA-PSK
  rsn_pairwise: CCMP
  country_code: US
  ip: 10.0.2.1
  subnet: 10.0.2.0/24
  dhcp_range_start: 10.0.2.100
  dhcp_range_end: 10.0.2.250
  dhcp_lease_time: 1h
  bridge_to_lan: false
  max_clients: 32
  hidden: false

admin:
  api_port: 8080
  # Frontend dev server (dev only)
  frontend_port: 3000

updates:
  auto_check: true
  check_interval_hours: 6
  github_repo: "PyKestrel/JetLag"
  channel: "stable"
  auto_download: false

captures:
  output_dir: /var/lib/jetlag/captures
  max_file_size_mb: 100

logging:
  level: INFO
  file: /var/log/jetlag/jetlag.log
  max_size_mb: 50
  backup_count: 5
